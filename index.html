<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POMS 主线流程总览</title>
<style>
  :root {
    --c-bg: #f5f7fa;
    --c-card: #ffffff;
    --c-text: #1f2937;
    --c-text-soft: #6b7280;
    --c-border: #e5e7eb;
    --c-primary: #1890ff;
    --c-primary-soft: #e6f4ff;
    --c-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --c-shadow-hover: 0 6px 16px rgba(24,144,255,.18), 0 3px 6px rgba(0,0,0,.04);

    /* 业务域配色 */
    --d-sale: #1890ff;
    --d-project: #722ed1;
    --d-quality: #13c2c2;
    --d-knowledge: #52c41a;
    --d-hr: #fa8c16;
    --d-collab: #eb2f96;
    --d-bi: #faad14;
    --d-system: #595959;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ============ 顶部 ============ */
  header.topbar {
    background: linear-gradient(135deg, #1890ff 0%, #0050b3 100%);
    color: #fff;
    padding: 24px 32px 18px;
    box-shadow: 0 2px 8px rgba(0,80,179,.18);
  }
  .topbar h1 {
    margin: 0 0 16px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: .5px;
  }

  .demo-entry-btn {
    display: inline-flex;
    align-items: center;
    padding: 12px 22px;
    background: #fff;
    color: #0050b3;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    white-space: nowrap;
  }

  .demo-entry-btn--project {
    color: #531dab;
  }

  .demo-entry-btn--knowledge {
    color: #237804;
  }

  .demo-entry-btn--talent {
    color: #d46b08;
  }

  .intro-mock-btn {
    display: inline-flex;
    margin-top: 14px;
  }

  .header-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .topbar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .demo-entry-btn:hover {
    color: #003a8c;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
  }

  /* ============ Tab 切换 ============ */
  .tabs {
    background: var(--c-card);
    padding: 0 24px;
    border-bottom: 1px solid var(--c-border);
    display: flex;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab {
    padding: 14px 20px;
    cursor: pointer;
    font-size: 14px;
    color: var(--c-text-soft);
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { color: var(--c-primary); }
  .tab.active {
    color: var(--c-primary);
    border-bottom-color: var(--c-primary);
    font-weight: 600;
  }
  .tab .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .tab .badge {
    font-size: 11px;
    padding: 1px 7px;
    background: #f0f0f0;
    color: var(--c-text-soft);
    border-radius: 10px;
    margin-left: 4px;
  }

  /* ============ 主区域 ============ */
  main {
    padding: 24px 32px 80px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .pipeline-intro {
    background: var(--c-card);
    padding: 18px 22px;
    border-radius: 8px;
    margin-bottom: 20px;
    border-left: 4px solid var(--c-primary);
    box-shadow: var(--c-shadow);
  }
  .pipeline-intro h2 {
    margin: 0 0 6px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pipeline-intro p {
    margin: 0;
    color: var(--c-text-soft);
    font-size: 13px;
  }

  /* ============ 流程图画布 ============ */
  .canvas {
    background: var(--c-card);
    border-radius: 8px;
    padding: 30px 22px;
    box-shadow: var(--c-shadow);
    overflow-x: auto;
  }
  .pipeline {
    display: none;
    flex-wrap: wrap;
    align-items: stretch;
    gap: 0;
    min-width: max-content;
  }
  .pipeline.active { display: flex; }

  /* 节点 */
  .node {
    background: #fff;
    border: 2px solid var(--c-border);
    border-radius: 10px;
    padding: 14px 14px 12px;
    width: 200px;
    cursor: pointer;
    position: relative;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 12px 0;
  }
  .node:hover {
    transform: translateY(-3px);
    border-color: var(--node-color, var(--c-primary));
    box-shadow: var(--c-shadow-hover);
  }
  .node .node-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--c-border);
  }
  .node .node-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--c-text);
  }
  .node .node-section {
    font-size: 11px;
    color: var(--node-color, var(--c-primary));
    background: var(--node-color, var(--c-primary))14;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .node .node-domain {
    font-size: 11px;
    color: var(--c-text-soft);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .node .node-domain::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--node-color, var(--c-primary));
  }
  .node .node-desc {
    font-size: 12px;
    color: var(--c-text-soft);
    line-height: 1.5;
    min-height: 36px;
  }
  .node .node-cta {
    font-size: 11px;
    color: var(--node-color, var(--c-primary));
    margin-top: auto;
    font-weight: 500;
  }

  /* 节点类型:起点/终点/决策 */
  .node.start { border-style: dashed; }
  .node.end { background: linear-gradient(135deg, #fff, #f6ffed); }
  .node.decision { border-radius: 4px; }

  /* 连线 */
  .arrow {
    align-self: center;
    width: 36px;
    min-width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .arrow svg { width: 100%; height: 14px; }
  .arrow .arrow-label {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--c-text-soft);
    background: var(--c-card);
    padding: 0 4px;
    white-space: nowrap;
  }
  .arrow.down {
    width: 100%;
    height: 30px;
    min-width: 0;
  }
  .arrow.down svg { transform: rotate(90deg); width: 30px; height: 14px; }

  /* 横向多通道(用于主线一) */
  .pipeline-wrap { display: flex; flex-direction: column; gap: 10px; }
  .lane {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 8px 12px;
    background: #fafbfc;
    border-radius: 6px;
    border-left: 3px solid var(--lane-color, var(--c-primary));
  }
  .lane-title {
    width: 110px;
    min-width: 110px;
    font-size: 12px;
    color: var(--c-text-soft);
    font-weight: 600;
    padding-right: 12px;
  }

  /* ============ 详情抽屉 ============ */
  .drawer-mask {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.32);
    z-index: 50;
    display: none;
  }
  .drawer-mask.open { display: block; }
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 460px;
    max-width: 92vw;
    height: 100vh;
    background: #fff;
    box-shadow: -4px 0 24px rgba(0,0,0,.12);
    z-index: 60;
    transform: translateX(100%);
    transition: transform .28s ease;
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--c-border);
    background: var(--c-primary-soft);
  }
  .drawer-head .dh-domain {
    font-size: 11px;
    color: var(--c-text-soft);
    margin-bottom: 4px;
  }
  .drawer-head h3 {
    margin: 0 0 4px;
    font-size: 18px;
    color: var(--c-text);
  }
  .drawer-head .dh-section {
    font-size: 12px;
    color: var(--c-primary);
  }
  .drawer-close {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 22px;
    color: var(--c-text-soft);
    line-height: 1;
  }
  .drawer-close:hover { color: var(--c-text); }
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 22px 24px;
  }
  .drawer-body section { margin-bottom: 18px; }
  .drawer-body h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--c-text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .drawer-body h4::before {
    content: '';
    width: 3px;
    height: 14px;
    background: var(--c-primary);
    border-radius: 2px;
  }
  .drawer-body p {
    margin: 0;
    font-size: 13px;
    color: var(--c-text-soft);
    line-height: 1.7;
  }
  .field-list, .rule-list {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .field-list li, .rule-list li {
    font-size: 13px;
    padding: 5px 0 5px 14px;
    color: var(--c-text);
    position: relative;
    line-height: 1.6;
  }
  .field-list li::before {
    content: '';
    position: absolute;
    left: 2px;
    top: 14px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--c-primary);
    opacity: .65;
  }
  .rule-list li::before {
    content: '✓';
    position: absolute;
    left: 0;
    top: 5px;
    color: #52c41a;
    font-weight: bold;
    font-size: 12px;
  }
  .upstream-downstream {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .ud-card {
    background: #fafbfc;
    border: 1px solid var(--c-border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .ud-card .ud-label {
    font-size: 11px;
    color: var(--c-text-soft);
    margin-bottom: 4px;
  }
  .ud-card .ud-name {
    font-size: 13px;
    color: var(--c-text);
    font-weight: 500;
  }

  /* ============ 图例 ============ */
  .legend {
    background: var(--c-card);
    border-radius: 8px;
    padding: 14px 20px;
    margin-top: 20px;
    box-shadow: var(--c-shadow);
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    font-size: 12px;
    color: var(--c-text-soft);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-item .ldot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  /* ============ 响应式 ============ */
  @media (max-width: 768px) {
    header.topbar { padding: 18px 16px 14px; }
    main { padding: 16px; }
    .node { width: 160px; }
    .drawer { width: 100vw; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-head">
    <h1>POMS 石油服务运营管理系统 · 主线流程总览</h1>
    <div class="header-actions">
      <a id="demo-entry-link" class="demo-entry-btn" href="./demo/index.html#/poms/phase1/index">进入销售 Mock 演示 →</a>
      <a id="demo-project-link" class="demo-entry-btn demo-entry-btn--project" href="./demo/index.html#/poms/phase2/index">进入项目主线 Mock →</a>
      <a id="demo-knowledge-link" class="demo-entry-btn demo-entry-btn--knowledge" href="./demo/index.html#/poms/phase3/index">进入知识主线 Mock →</a>
      <a id="demo-talent-link" class="demo-entry-btn demo-entry-btn--talent" href="./demo/index.html#/poms/phase4/index">进入人才主线 Mock →</a>
    </div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <div class="tab active" data-pipe="sales">
    <span class="dot" style="background:var(--d-sale)"></span>
    主线一:商机 → 回款<span class="badge">销售</span>
  </div>
  <div class="tab" data-pipe="project">
    <span class="dot" style="background:var(--d-project)"></span>
    主线二:立项 → 验收<span class="badge">项目</span>
  </div>
  <div class="tab" data-pipe="knowledge">
    <span class="dot" style="background:var(--d-knowledge)"></span>
    主线三:成果 → 知识<span class="badge">沉淀</span>
  </div>
  <div class="tab" data-pipe="talent">
    <span class="dot" style="background:var(--d-hr)"></span>
    主线四:招聘 → 投标<span class="badge">人才</span>
  </div>
  <div class="tab" data-pipe="collab">
    <span class="dot" style="background:var(--d-collab)"></span>
    横向:协同与预警<span class="badge">贯穿</span>
  </div>
</nav>

<main>
  <div id="intro-container"></div>
  <div class="canvas">
    <div id="pipelines-container"></div>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="ldot" style="background:var(--d-sale)"></span>销售管理</div>
    <div class="legend-item"><span class="ldot" style="background:var(--d-project)"></span>项目管理</div>
    <div class="legend-item"><span class="ldot" style="background:var(--d-quality)"></span>质量管理</div>
    <div class="legend-item"><span class="ldot" style="background:var(--d-knowledge)"></span>知识管理</div>
    <div class="legend-item"><span class="ldot" style="background:var(--d-hr)"></span>人力资源</div>
    <div class="legend-item"><span class="ldot" style="background:var(--d-collab)"></span>协同办公</div>
    <div class="legend-item"><span class="ldot" style="background:var(--d-bi)"></span>BI 分析</div>
    <div class="legend-item"><span class="ldot" style="background:var(--d-system)"></span>系统/验收</div>
    <div class="legend-item" style="margin-left:auto;color:#999">点击任意节点查看详情 →</div>
  </div>
</main>

<!-- 详情抽屉 -->
<div class="drawer-mask" id="drawerMask"></div>
<aside class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">×</button>
  <div class="drawer-head">
    <div class="dh-domain" id="dhDomain"></div>
    <h3 id="dhName"></h3>
    <div class="dh-section" id="dhSection"></div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<script>
/* ============ 业务域配色 ============ */
const DOMAIN_COLOR = {
  sale: '#1890ff', project: '#722ed1', quality: '#13c2c2',
  knowledge: '#52c41a', hr: '#fa8c16', collab: '#eb2f96',
  bi: '#faad14', system: '#595959', finance: '#fa541c'
};
const DOMAIN_LABEL = {
  sale: '销售管理', project: '项目管理', quality: '质量管理',
  knowledge: '知识管理', hr: '人力资源', collab: '协同办公',
  bi: 'BI 分析', system: '系统/验收', finance: '财务'
};

/* ============ 主线数据 ============ */
const PIPELINES = {
  sales: {
    name: '主线一:商机 → 回款',
    label: '销售主线',
    color: DOMAIN_COLOR.sale,
    description: '从销售线索到最终回款的全生命周期,贯穿商机、招投标、合同、立项、验收、回款。这是 POMS 业务对象流转最完整的主线,涉及销售、项目、协同三大域的协作。',
    nodes: [
      { id:'opp', name:'商机登记', section:'3.1', domain:'sale',
        desc:'建立商机台账,记录客户、项目、预计金额、阶段、跟进记录。',
        fields:['商机编号','商机来源','客户名称','项目名称','预计金额','当前阶段','跟进人','跟进记录(子表)'],
        rules:['同客户可多商机并行','阶段顺序推进允许回退','进入"已赢"前必须存在客户档案'],
        upstream:null, downstream:'tender' },
      { id:'tender', name:'招投标管理', section:'3.2', domain:'sale',
        desc:'登记招标信息、上传投标文件、记录开标时间与中标结果。',
        fields:['投标编号','关联商机','招标单位','招标方式','招标文件','投标文件','投标报价','开标时间','中标结果','投标保证金'],
        rules:['投标截止前 24h 自动提醒跟进人','投标保证金同步到项目费用','中标通知书上传后触发中标管理'],
        upstream:'opp', downstream:'winbid' },
      { id:'winbid', name:'中标管理', section:'3.3', domain:'sale',
        desc:'上传中标通知书,记录中标金额/日期,驱动合同起草。',
        fields:['中标编号','关联投标','中标通知书','中标金额','中标日期','服务期','履约保证金','中标服务费','合同状态'],
        rules:['中标金额不得高于投标报价','中标通知书必传','履约保证金/中标服务费同步到项目费用'],
        upstream:'tender', downstream:'contract' },
      { id:'contract', name:'合同起草 + OCR', section:'3.4 / 3.6', domain:'sale',
        desc:'起草合同,支持 OCR 自动识别客户/金额/付款节点。',
        fields:['合同编号','关联中标/商机','客户名称','项目名称','合同类型','服务内容','服务周期','合同金额','付款计划(子表)','合同附件'],
        rules:['合同必须关联中标或商机','合同金额与中标金额不一致需说明','产品明细语义调整为服务内容'],
        upstream:'winbid', downstream:'approval' },
      { id:'approval', name:'合同审批(OA 集成)', section:'3.5', domain:'collab',
        desc:'对接现有 OA 工作流,提交合同审批。',
        fields:['审批流程','审批人','审批意见','审批结果','用印类型','用印次数'],
        rules:['不同合同类型/金额走不同审批流','审批拒绝回到草稿状态','前端只透传,流程定义由 flow 模块决定'],
        upstream:'contract', downstream:'seal' },
      { id:'seal', name:'用印申请', section:'8.2', domain:'collab',
        desc:'审批通过后申请用印,准备签订。',
        fields:['用印类型','用印用途','用印次数','合同附件份数'],
        rules:['默认 1 正本 + N 副本','用印由印章管理员执行'],
        upstream:'approval', downstream:'sign' },
      { id:'sign', name:'合同签订', section:'3.4', domain:'sale',
        desc:'合同状态变更为"已签",触发项目立项入口。',
        fields:['签约时间','合同正本','用印记录','合同状态'],
        rules:['"已签"自动触发项目立项入口','一个合同可立项多个项目'],
        upstream:'seal', downstream:'projectInit' },
      { id:'projectInit', name:'项目立项', section:'4.1', domain:'project',
        desc:'从合同继承客户/合同信息,创建项目。',
        fields:['项目编号','客户名称(继承)','项目名称','合同金额(继承)','服务周期(继承)','项目经理'],
        rules:['入口嵌入合同详情页','不再保留独立"新增项目"录入','合同已签后出现"项目立项"按钮'],
        upstream:'sign', downstream:'accept' },
      { id:'accept', name:'项目验收', section:'4.12', domain:'project',
        desc:'(项目执行完成后)客户验收 + 内部签批,触发尾款。',
        fields:['验收编号','关联项目','客户验收报告','验收意见','验收结论','关联合同'],
        rules:['所有任务完成 + 最终里程碑待验收才能发起','通过触发尾款/质保金回款节点','不通过进入整改流程'],
        upstream:'projectInit', downstream:'payment' },

/* ============ 渲染 ============ */
const arrowSVG = `<svg viewBox="0 0 36 14" xmlns="http://www.w3.org/2000/svg">
  <line x1="0" y1="7" x2="28" y2="7" stroke="#bfbfbf" stroke-width="2" stroke-dasharray="3,3"/>
  <polygon points="28,2 36,7 28,12" fill="#1890ff"/>
</svg>`;

function renderIntro(key) {
  const p = PIPELINES[key];
  const mockRoute = MOCK_ROUTES[key];
  const mockBtn = mockRoute
    ? `<a class="demo-entry-btn intro-mock-btn" href="${resolveDemoUrl(mockRoute)}">进入${p.label} Mock 演示 →</a>`
    : '';
  document.getElementById('intro-container').innerHTML = `
    <div class="pipeline-intro" style="border-left-color:${p.color}">
      <h2><span class="dot" style="background:${p.color};width:10px;height:10px;border-radius:50%;display:inline-block"></span>${p.name}<span style="font-size:12px;color:#999;font-weight:normal;margin-left:8px">(${p.label})</span></h2>
      <p>${p.description}</p>
      ${mockBtn}
    </div>
  `;
}

function renderPipeline(key) {
  const p = PIPELINES[key];
  const nodes = p.nodes;
  let html = `<div class="pipeline active" id="pipe-${key}">`;
  nodes.forEach((n, i) => {
    const color = DOMAIN_COLOR[n.domain];
    const cls = ['node'];
    if (i === 0) cls.push('start');
    if (n.isEnd) cls.push('end');
    if (n.isDecision) cls.push('decision');
    html += `<div class="${cls.join(' ')}" style="--node-color:${color}" data-pipe="${key}" data-node="${n.id}">
      <div class="node-head">
        <span class="node-name">${n.name}</span>
        <span class="node-section">${n.section}</span>
      </div>
      <div class="node-domain">${DOMAIN_LABEL[n.domain]}</div>
      <div class="node-desc">${n.desc}</div>
      <div class="node-cta">点击查看字段与规则 →</div>
    </div>`;
    if (i < nodes.length - 1) {
      const next = nodes[i+1];
      const label = next.upstream === n.id ? '' : (next.upstream ? '回路' : '');
      html += `<div class="arrow"><div class="arrow-label">${label}</div>${arrowSVG}</div>`;
    }
  });
  html += `</div>`;
  return html;
}

function renderAll() {
  const container = document.getElementById('pipelines-container');
  let html = '';
  Object.keys(PIPELINES).forEach((key, i) => {
    html += `<div class="pipeline-wrap" data-wrap="${key}" style="${i===0?'':'display:none'}">${renderPipeline(key)}</div>`;
  });
  container.innerHTML = html;
}

/* ============ 详情抽屉 ============ */
function openDrawer(pipeKey, nodeId) {
  const p = PIPELINES[pipeKey];
  const node = p.nodes.find(n => n.id === nodeId);
  if (!node) return;
  const color = DOMAIN_COLOR[node.domain];

  document.getElementById('dhDomain').textContent = DOMAIN_LABEL[node.domain] + ' · ' + p.label;
  document.getElementById('dhName').textContent = node.name;
  document.getElementById('dhSection').textContent = '对应文档章节:' + node.section;
  document.querySelector('.drawer-head').style.background = color + '14';

  const fieldsHtml = node.fields.map(f => `<li>${f}</li>`).join('');
  const rulesHtml = node.rules.map(r => `<li>${r}</li>`).join('');

  const findName = (id) => id ? (p.nodes.find(n => n.id === id)?.name || '—') : '—';
  const upDownHtml = `
    <div class="ud-card">
      <div class="ud-label">⬆ 上游(触发来源)</div>
      <div class="ud-name">${findName(node.upstream)}</div>
    </div>
    <div class="ud-card">
      <div class="ud-label">⬇ 下游(流转去向)</div>
      <div class="ud-name">${findName(node.downstream)}</div>
    </div>`;

  document.getElementById('drawerBody').innerHTML = `
    <section>
      <h4>功能描述</h4>
      <p>${node.desc}</p>
    </section>
    <section>
      <h4>关键业务字段</h4>
      <ul class="field-list">${fieldsHtml}</ul>
    </section>
    <section>
      <h4>关键规则</h4>
      <ul class="rule-list">${rulesHtml}</ul>
    </section>
    <section>
      <h4>业务流转</h4>
      <div class="upstream-downstream">${upDownHtml}</div>
    </section>
    <section>
      <h4>所属主线</h4>
      <p>${p.name} (${p.label})</p>
    </section>
  `;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerMask').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerMask').classList.remove('open');
}

/* ============ Mock 演示入口（GitHub Pages 需绝对路径） ============ */
const MOCK_ROUTES = {
  sales: '/poms/phase1/index',
  project: '/poms/phase2/index',
  knowledge: '/poms/phase3/index',
  talent: '/poms/phase4/index',
};

function resolveDemoUrl(route) {
  const hash = route.startsWith('#') ? route : `#${route}`;
  if (location.hostname.endsWith('github.io')) {
    const repo = location.pathname.split('/').filter(Boolean)[0] || 'klmy';
    return `${location.origin}/${repo}/demo/index.html${hash}`;
  }
  if (location.port === '2889') {
    return `${location.origin}/${hash.replace(/^#/, '')}`;
  }
  return `./demo/index.html${hash}`;
}

function applyDemoLinks() {
  const map = {
    'demo-entry-link': MOCK_ROUTES.sales,
    'demo-project-link': MOCK_ROUTES.project,
    'demo-knowledge-link': MOCK_ROUTES.knowledge,
    'demo-talent-link': MOCK_ROUTES.talent,
  };
  Object.entries(map).forEach(([id, route]) => {
    const el = document.getElementById(id);
    if (el) el.href = resolveDemoUrl(route);
  });
}

/* ============ Tab 切换 ============ */
function switchTab(key) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.pipe === key);
  });
  document.querySelectorAll('[data-wrap]').forEach(w => {
    w.style.display = w.dataset.wrap === key ? '' : 'none';
  });
  renderIntro(key);
}

/* ============ 事件绑定 ============ */
document.addEventListener('DOMContentLoaded', () => {
  applyDemoLinks();
  renderAll();
  renderIntro('sales');

  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (tab) switchTab(tab.dataset.pipe);
  });

  document.getElementById('pipelines-container').addEventListener('click', e => {
    const node = e.target.closest('.node');
    if (node) openDrawer(node.dataset.pipe, node.dataset.node);
  });

  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  document.getElementById('drawerMask').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
});
</script>
