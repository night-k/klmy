<?xml version="1.0" encoding="UTF-8"?>
<svg width="360" height="240" viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="360" height="240" fill="#f5f5f7" rx="4" ry="4"/>
  
  <!-- 浏览器顶部栏 -->
  <rect width="360" height="24" fill="#e0e0e2" rx="4" ry="4"/>
  
  <!-- 浏览器控制按钮 -->
  <circle cx="12" cy="12" r="4" fill="#ff6058"/>
  <circle cx="28" cy="12" r="4" fill="#ffbd2e"/>
  <circle cx="44" cy="12" r="4" fill="#28c941"/>
  
  <!-- 浏览器地址栏 -->
  <rect x="60" y="36" width="240" height="16" fill="#e0e0e2" rx="8" ry="8"/>
  
  <!-- 聊天窗口 -->
  <rect x="240" y="70" width="100" height="140" fill="white" stroke="#a8c7fa" stroke-width="1" rx="8" ry="8"/>
  
  <!-- 聊天窗口顶部 -->
  <rect x="240" y="70" width="100" height="30" fill="#f8f9fa" stroke="#a8c7fa" stroke-width="1" rx="8" ry="8"/>

  <!-- 标题文本 -->
  <rect x="265" y="80" width="65" height="5" fill="#e0e0e2" rx="1" ry="1"/>
  <rect x="265" y="90" width="50" height="5" fill="#e0e0e2" rx="1" ry="1"/>
  
  <!-- 关闭按钮 - 移到右上角 -->
  <circle cx="330" cy="85" r="8" fill="#a8c7fa"/>
  <path d="M327,82 L333,88 M333,82 L327,88" stroke="white" stroke-width="1" stroke-linecap="round"/>
  
  <!-- 聊天内容区域 -->
  <rect x="250" y="110" width="80" height="5" fill="#e0e0e2" rx="1" ry="1"/>
  <rect x="250" y="120" width="70" height="5" fill="#e0e0e2" rx="1" ry="1"/>
  
  <!-- 聊天窗口底部工具栏 -->
  <rect x="240" y="180" width="100" height="30" fill="#f8f9fa" stroke="#a8c7fa" stroke-width="1" rx="8" ry="8"/>
  
  <!-- 编辑图标 -->
  <circle cx="255" cy="195" r="4" fill="#9aa0a6"/>
  <path d="M253,195 L257,195 M255,193 L255,197" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- 附件按钮 -->
  <circle cx="270" cy="195" r="4" fill="#9aa0a6"/>
  <rect x="268" y="193" width="4" height="4" fill="white" rx="1" ry="1" transform="scale(0.8) translate(67, 48)"/>
  
  <!-- 发送按钮 -->
  <circle cx="325" cy="195" r="8" fill="#a8c7fa"/>
  <path d="M322,195 L328,195 M325,192 L328,195 L325,198" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
</svg> 