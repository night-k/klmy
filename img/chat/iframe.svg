<?xml version="1.0" encoding="UTF-8"?>
<svg width="360" height="240" viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="360" height="240" fill="#f5f5f7" rx="4" ry="4"/>
  
  <!-- 浏览器顶部栏 -->
  <rect width="360" height="24" fill="#e0e0e2" rx="4" ry="4"/>
  
  <!-- 浏览器控制按钮 -->
  <circle cx="12" cy="12" r="4" fill="#ff6058"/>
  <circle cx="28" cy="12" r="4" fill="#ffbd2e"/>
  <circle cx="44" cy="12" r="4" fill="#28c941"/>
  
  <!-- 聊天窗口 -->
  <rect x="60" y="50" width="240" height="160" fill="white" stroke="#a8c7fa" stroke-width="1" rx="8" ry="8"/>
  
  <!-- 聊天窗口顶部 -->
  <rect x="60" y="50" width="240" height="30" fill="#f8f9fa" stroke="#a8c7fa" stroke-width="1" rx="8" ry="8"/>
  <path d="M80,65 L85,65" stroke="#a8c7fa" stroke-width="1" stroke-linecap="round"/>
  <rect x="90" y="60" width="180" height="10" fill="#e0e0e2" rx="2" ry="2"/>
  
  <!-- 聊天内容区域 -->
  <rect x="80" y="90" width="200" height="10" fill="#e0e0e2" rx="2" ry="2"/>
  <rect x="80" y="110" width="180" height="10" fill="#e0e0e2" rx="2" ry="2"/>
  
  <!-- 聊天窗口底部工具栏 -->
  <rect x="60" y="180" width="240" height="30" fill="#f8f9fa" stroke="#a8c7fa" stroke-width="1" rx="8" ry="8"/>
  
  <!-- 编辑图标 -->
  <circle cx="80" cy="195" r="5" fill="#9aa0a6"/>
  <path d="M77,195 L83,195 M80,192 L80,198" stroke="white" stroke-width="1" stroke-linecap="round"/>
  
  <!-- 发送按钮 -->
  <circle cx="280" cy="195" r="5" fill="#a8c7fa"/>
  <path d="M277,195 L283,195" stroke="white" stroke-width="1" stroke-linecap="round"/>
  
  <!-- 附件按钮 -->
  <circle cx="260" cy="195" r="5" fill="#9aa0a6"/>
  <rect x="258" y="193" width="4" height="4" fill="white" rx="1" ry="1"/>
</svg> 